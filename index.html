<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coral Reef Slot | hirotayuki</title>
    <style>
        :root {
            --ocean-blue: #0077be;
            --coral-pink: #ff7f50;
            --sand-white: #f4f4f4;
        }

        body {
            background: linear-gradient(180deg, #00b4db 0%, #0083b0 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 30px;
            border: 4px solid var(--coral-pink);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .slot-machine {
            display: flex;
            gap: 15px;
            margin-bottom: 2rem;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
        }

        .reel {
            width: 80px;
            height: 80px;
            background: var(--sand-white);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            color: #333;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .controls button {
            background: var(--coral-pink);
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .controls button:active {
            transform: scale(0.95);
        }

        .controls button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .message {
            margin-top: 1.5rem;
            font-size: 1.2rem;
            min-height: 1.5em;
        }

        /* 泡のアニメーション */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            bottom: -50px;
            animation: rise 5s infinite ease-in;
        }

        @keyframes rise {
            to { transform: translateY(-110vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>🪸 CORAL SLOT</h1>
        <div class="slot-machine">
            <div id="reel1" class="reel">🪸</div>
            <div id="reel2" class="reel">🐚</div>
            <div id="reel3" class="reel">🐟</div>
        </div>
        <div class="controls">
            <button id="spin-btn">SPIN!</button>
        </div>
        <div id="message" class="message">運試しをしよう！</div>
    </div>

    <script>
        const symbols = ['🪸', '🐠', '🐚', '🐙', '🦈', '💎'];
        const btn = document.getElementById('spin-btn');
        const reels = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3')
        ];
        const message = document.getElementById('message');

        function createBubble() {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 30 + 10 + 'px';
            bubble.style.width = size;
            bubble.style.height = size;
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(bubble);
            setTimeout(() => bubble.remove(), 5000);
        }
        setInterval(createBubble, 500);

        btn.addEventListener('click', () => {
            btn.disabled = true;
            message.textContent = "スピン中...";
            
            let count = 0;
            const spinInterval = setInterval(() => {
                reels.forEach(reel => {
                    reel.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                });
                count++;
                if (count > 15) {
                    clearInterval(spinInterval);
                    checkWin();
                }
            }, 100);
        });

        function checkWin() {
            const results = reels.map(r => r.textContent);
            btn.disabled = false;

            if (results[0] === results[1] && results[1] === results[2]) {
                message.innerHTML = "🎉 <span style='color: #fff700'>JACKPOT!</span> 素晴らしい！";
                if (results[0] === '🪸') message.innerHTML += "<br>サンゴマスター！";
            } else if (results[0] === results[1] || results[1] === results[2] || results[0] === results[2]) {
                message.textContent = "✨ 惜しい！あと少し！";
            } else {
                message.textContent = "次は当たるかも？";
            }
        }
    </script>
</body>
</html>
